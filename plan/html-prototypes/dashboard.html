<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELT系统 - 仪表板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .main-container {
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 200px;
            background-color: #545c64;
            color: white;
            display: flex;
            flex-direction: column;
        }
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .menu-item:hover {
            background-color: #454c54;
        }
        .menu-item.active {
            background-color: #409eff;
            color: white;
        }
        .submenu-title {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: bold;
        }
        .submenu-items {
            list-style: none;
            padding-left: 20px;
            display: none;
        }
        .submenu-items.show {
            display: block;
        }
        .submenu-items .menu-item {
            padding: 8px 10px;
            font-size: 14px;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            height: 60px;
            background-color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 1px 4px rgba(0,21,41,.08);
        }
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #f0f2f5;
        }
        .card {
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            color: #409eff;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #fff;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 4px;
        }
        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        .icon {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li class="menu-item active" onclick="navigateTo('dashboard')">
                    <span class="icon">☰</span>
                    <span>仪表板</span>
                </li>

                <li class="submenu-title" onclick="toggleSubmenu('data-source-submenu')">
                    <span class="icon">⚙️</span>
                    <span>数据源管理</span>
                </li>
                <ul id="data-source-submenu" class="submenu-items">
                    <li class="menu-item" onclick="location.href='data-source.html'">数据源列表</li>
                    <li class="menu-item" onclick="location.href='data-source.html'">添加数据源</li>
                </ul>

                <li class="submenu-title" onclick="toggleSubmenu('elt-config-submenu')">
                    <span class="icon">📊</span>
                    <span>ELT配置</span>
                </li>
                <ul id="elt-config-submenu" class="submenu-items">
                    <li class="menu-item" onclick="location.href='elt-task-list.html'">任务列表</li>
                    <li class="menu-item" onclick="location.href='elt-config.html'">创建任务</li>
                </ul>

                <li class="submenu-title" onclick="toggleSubmenu('schedule-config-submenu')">
                    <span class="icon">⏱️</span>
                    <span>调度配置</span>
                </li>
                <ul id="schedule-config-submenu" class="submenu-items">
                    <li class="menu-item" onclick="location.href='schedule-list.html'">调度列表</li>
                    <li class="menu-item" onclick="location.href='schedule-create.html'">创建调度</li>
                </ul>
            </ul>
        </div>

        <!-- 主内容区 -->
        <div class="content">
            <div class="header">
                <h3>ELT数据管理系统</h3>
                <div>
                    <div class="dropdown">
                        <span class="dropdown-link">
                            用户名 ▼
                        </span>
                        <div class="dropdown-content">
                            <a href="#" onclick="showProfile()">个人中心</a>
                            <a href="#" onclick="logout()">退出登录</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <h1>欢迎使用ELT数据管理系统</h1>
                <p>这是一个用于管理数据源、配置ETL任务和调度的平台。</p>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div>数据源数量</div>
                        <div class="stat-number">0</div>
                    </div>
                    <div class="stat-card">
                        <div>ELT任务数</div>
                        <div class="stat-number">0</div>
                    </div>
                    <div class="stat-card">
                        <div>调度任务数</div>
                        <div class="stat-number">0</div>
                    </div>
                    <div class="stat-card">
                        <div>最近执行</div>
                        <div class="stat-number">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleSubmenu(submenuId) {
            const submenu = document.getElementById(submenuId);
            submenu.classList.toggle('show');
        }

        function navigateTo(page) {
            // 这里可以实现页面跳转逻辑
            alert(`导航到 ${page}`);
        }

        function showProfile() {
            // 这里可以实现显示个人中心的逻辑
            alert('显示个人中心');
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        // 初始化 - 默认展开所有子菜单
        document.addEventListener('DOMContentLoaded', function() {
            const submenus = document.querySelectorAll('.submenu-items');
            submenus.forEach(submenu => {
                submenu.classList.add('show');
            });
        });
    </script>
</body>
</html>

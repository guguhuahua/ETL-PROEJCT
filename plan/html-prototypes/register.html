<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELT系统 - 注册</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }
        .register-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-form {
            width: 400px;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h2 {
            color: #409EFF;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #409eff;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }
        .btn-primary {
            background-color: #409eff;
            color: white;
        }
        .btn-default {
            background-color: #c6e2ff;
            color: #409eff;
        }
        .btn-block {
            display: block;
            width: 100%;
        }
        .error-message {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }
        .icon-input {
            position: relative;
        }
        .icon-input input {
            padding-left: 35px;
        }
        .icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #c0c4cc;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-form">
            <div class="logo">
                <h2>用户注册</h2>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="icon-input">
                        <span class="icon">👤</span>
                        <input type="text" id="username" name="username" placeholder="请输入用户名">
                    </div>
                    <div id="username-error" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="email">邮箱</label>
                    <div class="icon-input">
                        <span class="icon">✉️</span>
                        <input type="email" id="email" name="email" placeholder="请输入邮箱地址">
                    </div>
                    <div id="email-error" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="icon-input">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="请输入密码">
                    </div>
                    <div id="password-error" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <div class="icon-input">
                        <span class="icon">🔒</span>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请确认密码">
                    </div>
                    <div id="confirmPassword-error" class="error-message"></div>
                </div>

                <div class="form-group">
                    <button type="button" class="btn btn-primary btn-block" onclick="handleRegister()">注册</button>
                </div>

                <div class="form-group">
                    <button type="button" class="btn btn-default btn-block" onclick="goToLogin()">已有账户？去登录</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function handleRegister() {
            // 获取表单数据
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 清除之前的错误消息
            document.getElementById('username-error').textContent = '';
            document.getElementById('email-error').textContent = '';
            document.getElementById('password-error').textContent = '';
            document.getElementById('confirmPassword-error').textContent = '';

            // 简单验证
            let isValid = true;

            if (!username) {
                document.getElementById('username-error').textContent = '请输入用户名';
                isValid = false;
            } else if (username.length < 3 || username.length > 15) {
                document.getElementById('username-error').textContent = '长度在 3 到 15 个字符';
                isValid = false;
            }

            if (!email) {
                document.getElementById('email-error').textContent = '请输入邮箱地址';
                isValid = false;
            } else if (!isValidEmail(email)) {
                document.getElementById('email-error').textContent = '请输入正确的邮箱地址';
                isValid = false;
            }

            if (!password) {
                document.getElementById('password-error').textContent = '请输入密码';
                isValid = false;
            } else if (password.length < 6) {
                document.getElementById('password-error').textContent = '密码长度不能少于6位';
                isValid = false;
            }

            if (!confirmPassword) {
                document.getElementById('confirmPassword-error').textContent = '请再次输入密码';
                isValid = false;
            } else if (password !== confirmPassword) {
                document.getElementById('confirmPassword-error').textContent = '两次输入密码不一致!';
                isValid = false;
            }

            if (isValid) {
                // 这里可以发送注册请求
                alert('注册成功，请登录');
                // 模拟跳转到登录页
                window.location.href = 'login.html';
            }
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function goToLogin() {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELT系统 - 登录</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }
        .login-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-form {
            width: 400px;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h2 {
            color: #409EFF;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }
        .btn-primary {
            background-color: #409eff;
            color: white;
        }
        .btn-default {
            background-color: #c6e2ff;
            color: #409eff;
        }
        .btn-block {
            display: block;
            width: 100%;
        }
        .error-message {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form">
            <div class="logo">
                <h2>ELT数据管理系统</h2>
            </div>
            <div class="form-group">
                <label for="username">用户名或邮箱</label>
                <input type="text" id="username" placeholder="请输入用户名或邮箱">
                <div id="username-error" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码">
                <div id="password-error" class="error-message"></div>
            </div>
            <div class="form-group">
                <button type="button" class="btn btn-primary btn-block" onclick="handleLogin()">登录</button>
            </div>
            <div class="form-group">
                <button type="button" class="btn btn-default btn-block" onclick="window.location.href='register.html'">注册</button>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            // 获取表单数据
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // 清除之前的错误消息
            document.getElementById('username-error').textContent = '';
            document.getElementById('password-error').textContent = '';

            // 简单验证
            let isValid = true;

            if (!username) {
                document.getElementById('username-error').textContent = '请输入用户名';
                isValid = false;
            }

            if (!password) {
                document.getElementById('password-error').textContent = '请输入密码';
                isValid = false;
            } else if (password.length < 6) {
                document.getElementById('password-error').textContent = '密码长度不能少于6位';
                isValid = false;
            }

            if (isValid) {
                // 这里可以发送登录请求
                alert('登录成功');
                // 模拟跳转到仪表板
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>

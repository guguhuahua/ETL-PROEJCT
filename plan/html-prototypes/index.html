<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELT系统 - 首页</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .welcome-container {
            text-align: center;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .welcome-container h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .welcome-container p {
            font-size: 1.2em;
            margin-bottom: 30px;
            max-width: 500px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background-color: #00b894;
            color: white;
        }
        .btn-outline {
            background-color: transparent;
            color: white;
            border: 2px solid white;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .features {
            margin-top: 40px;
            text-align: left;
            max-width: 500px;
        }
        .feature-item {
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>>Welcome to ELT Data Management System</h1>
        <p>高效的数据提取、加载和转换平台，帮助您轻松管理异构数据源之间的数据流转。</p>

        <div>
            <a href="login.html" class="btn btn-primary">登录系统</a>
            <a href="register.html" class="btn btn-outline">用户注册</a>
        </div>

        <div class="features">
            <h3>系统功能：</h3>
            <div class="feature-item">• 支持多种数据源（Hive, Kingbase8等）</div>
            <div class="feature-item">• 可视化ELT任务配置</div>
            <div class="feature-item">• 灵活的调度管理</div>
            <div class="feature-item">• 完整的依赖关系管理</div>
            <div class="feature-item">• 丰富的字段转换功能</div>
        </div>
    </div>
</body>
</html>
